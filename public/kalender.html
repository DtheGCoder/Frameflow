<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Kalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/styles.css?v=3" />
    <link rel="stylesheet" href="/static/kalender.css?v=royal7" />
  </head>
  <body class="kal-shell">

    <!-- seitliche goldene Zierleisten -->
    <div class="kal-side-rail kal-side-rail-left" aria-hidden="true"></div>
    <div class="kal-side-rail kal-side-rail-right" aria-hidden="true"></div>

    <!-- ============ TOP BAR ============ -->
    <header class="kal-topbar">
      <button id="kalMenuToggle" class="kal-icon-btn" type="button" aria-label="Menü">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="kal-title-wrap">
        <svg class="kal-crown" viewBox="0 0 44 18" width="44" height="18" aria-hidden="true">
          <path d="M4 14 L8 4 L14 11 L22 2 L30 11 L36 4 L40 14 Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <circle cx="8"  cy="3"  r="1.6" fill="currentColor"/>
          <circle cx="22" cy="1.3" r="1.8" fill="currentColor"/>
          <circle cx="36" cy="3"  r="1.6" fill="currentColor"/>
          <path d="M4 14 H40" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="14" cy="16" r="0.9" fill="currentColor" opacity="0.7"/>
          <circle cx="22" cy="16" r="0.9" fill="currentColor" opacity="0.9"/>
          <circle cx="30" cy="16" r="0.9" fill="currentColor" opacity="0.7"/>
        </svg>
        <h1 id="calendarTitle" class="kal-title">Heute</h1>
      </div>
      <button id="kalTodayBtn" class="kal-icon-btn" type="button" aria-label="Heute">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      </button>
    </header>

    <!-- ============ KARTUSCHE UNTER TITEL ============ -->
    <div class="kal-cartouche" aria-hidden="true">
      <svg viewBox="0 0 360 26" width="100%" height="26" preserveAspectRatio="xMidYMid meet">
        <!-- linke Ranke -->
        <path d="M10 13 Q30 4 55 13 Q70 19 88 13 Q100 8 112 13 Q125 18 140 13" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        <path d="M55 13 Q50 6 58 5 Q60 9 55 13" fill="currentColor" opacity="0.7"/>
        <path d="M88 13 Q94 20 86 22 Q84 18 88 13" fill="currentColor" opacity="0.7"/>
        <!-- Mitte: Fleur-de-Lys -->
        <g transform="translate(180 13)">
          <path d="M0 -10 Q-3 -4 0 0 Q3 -4 0 -10 Z" fill="currentColor"/>
          <path d="M0 0 Q-8 -2 -10 4 Q-6 5 -2 2 Z" fill="currentColor" opacity="0.9"/>
          <path d="M0 0 Q8 -2 10 4 Q6 5 2 2 Z" fill="currentColor" opacity="0.9"/>
          <path d="M-7 5 H7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="0" cy="-12" r="1.3" fill="currentColor"/>
        </g>
        <!-- rechte Ranke (gespiegelt) -->
        <path d="M350 13 Q330 4 305 13 Q290 19 272 13 Q260 8 248 13 Q235 18 220 13" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        <path d="M305 13 Q310 6 302 5 Q300 9 305 13" fill="currentColor" opacity="0.7"/>
        <path d="M272 13 Q266 20 274 22 Q276 18 272 13" fill="currentColor" opacity="0.7"/>
      </svg>
    </div>

    <!-- ============ VIEW SWITCHER ============ -->
    <nav class="kal-viewbar" id="calendarViewTabs" role="tablist">
      <button type="button" class="is-active" data-view="day">Tag</button>
      <button type="button" data-view="week">Woche</button>
      <button type="button" data-view="month">Monat</button>
    </nav>

    <!-- ============ NAV (prev / next) ============ -->
    <div class="kal-navbar">
      <button id="calendarPrev" class="kal-nav-btn" type="button" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
      <button id="calendarToday" class="kal-today-btn" type="button">Heute</button>
      <button id="calendarNext" class="kal-nav-btn" type="button" aria-label="Weiter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>

    <!-- ============ CALENDAR SURFACE (reused by calendar.js) ============ -->
    <main class="kal-main">
      <section id="calendarTab" class="kal-panel is-active">
        <div id="calendarSurface" class="kal-surface kal-stucco">
          <span class="kal-corner kal-corner-tl" aria-hidden="true"></span>
          <span class="kal-corner kal-corner-tr" aria-hidden="true"></span>
          <span class="kal-corner kal-corner-bl" aria-hidden="true"></span>
          <span class="kal-corner kal-corner-br" aria-hidden="true"></span>
          <div id="calendarViewContent" class="kal-view-content"></div>
        </div>
      </section>

      <section id="categoriesTab" class="kal-panel">
        <div class="kal-panel-head">
          <h2>Kategorien</h2>
          <button id="openNewCategory" class="kal-primary" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Neu
          </button>
        </div>
        <div class="kal-flourish" aria-hidden="true">
          <svg viewBox="0 0 120 14" width="120" height="14"><path d="M2 7 Q20 1 40 7 T80 7 T118 7" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><circle cx="60" cy="7" r="2.5" fill="currentColor"/><circle cx="40" cy="7" r="1.2" fill="currentColor" opacity="0.6"/><circle cx="80" cy="7" r="1.2" fill="currentColor" opacity="0.6"/></svg>
        </div>
        <div id="categoryList" class="kal-category-list"></div>
      </section>

      <section id="settingsTab" class="kal-panel">
        <h2 class="kal-panel-head-title">Einstellungen</h2>
        <div class="kal-flourish" aria-hidden="true">
          <svg viewBox="0 0 160 22" width="160" height="22"><path d="M4 11 Q30 2 60 11 T120 11 Q150 2 156 11" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><path d="M80 4 Q76 8 80 11 Q84 8 80 4 Z M80 11 Q76 14 80 18 Q84 14 80 11 Z" fill="currentColor"/><circle cx="30" cy="11" r="1.3" fill="currentColor" opacity="0.55"/><circle cx="130" cy="11" r="1.3" fill="currentColor" opacity="0.55"/></svg>
        </div>
        <form id="calendarSettingsForm" class="kal-settings">
          <label class="kal-field">
            <span>Termine im Foto-Widget</span>
            <input name="photoWidgetMax" type="number" min="1" max="6" step="1" inputmode="numeric" />
            <small class="kal-field-hint">Wie viele Termine sollen im Fotomodus angezeigt werden?</small>
          </label>
          <label class="kal-switch">
            <input name="showPhotoWidget" type="checkbox" />
            <span class="kal-switch-track"><span class="kal-switch-thumb"></span></span>
            <span class="kal-switch-label">Terminvorschau im Foto-Modus</span>
          </label>
          <label class="kal-switch">
            <input name="swipeEnabled" type="checkbox" />
            <span class="kal-switch-track"><span class="kal-switch-thumb"></span></span>
            <span class="kal-switch-label">Wischgesten zwischen Foto &amp; Kalender</span>
          </label>
          <button class="kal-primary kal-primary-block" type="submit">Speichern</button>
        </form>
      </section>
    </main>

    <!-- ============ MENÜ OVERLAY (öffnet sich aus dem Hamburger oben links) ============ -->
    <div id="kalMenuOverlay" class="kal-menu-overlay" aria-hidden="true">
      <div class="kal-menu-scrim" data-close-menu></div>
      <aside class="kal-menu-panel" role="dialog" aria-label="Menü">
        <div class="kal-menu-arrow" aria-hidden="true"></div>
        <div class="kal-menu-head">
          <svg class="kal-menu-crown" viewBox="0 0 44 18" width="32" height="14" aria-hidden="true">
            <path d="M4 14 L8 4 L14 11 L22 2 L30 11 L36 4 L40 14 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="8" cy="3" r="1.6" fill="currentColor"/>
            <circle cx="22" cy="1.3" r="1.8" fill="currentColor"/>
            <circle cx="36" cy="3" r="1.6" fill="currentColor"/>
            <path d="M4 14 H40" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <h2 class="kal-menu-title">Menü</h2>
          <button type="button" class="kal-menu-close" data-close-menu aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div class="kal-menu-divider" aria-hidden="true"></div>
        <nav id="mainTabs" class="kal-menu-list" role="tablist">
          <button type="button" data-tab="calendar" class="kal-menu-item is-active">
            <span class="kal-menu-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
            </span>
            <span class="kal-menu-item-text">
              <span class="kal-menu-item-title">Kalender</span>
              <span class="kal-menu-item-sub">Alle deine Termine</span>
            </span>
            <svg class="kal-menu-item-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button type="button" data-tab="categories" class="kal-menu-item">
            <span class="kal-menu-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="7" height="7" rx="1.2"/><rect x="14" y="4" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/></svg>
            </span>
            <span class="kal-menu-item-text">
              <span class="kal-menu-item-title">Kategorien</span>
              <span class="kal-menu-item-sub">Farben &amp; Symbole verwalten</span>
            </span>
            <svg class="kal-menu-item-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button type="button" data-tab="settings" class="kal-menu-item">
            <span class="kal-menu-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </span>
            <span class="kal-menu-item-text">
              <span class="kal-menu-item-title">Einstellungen</span>
              <span class="kal-menu-item-sub">Foto-Widget &amp; Gesten</span>
            </span>
            <svg class="kal-menu-item-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>
        </nav>
        <div class="kal-menu-flourish" aria-hidden="true">
          <svg viewBox="0 0 240 18" width="100%" height="14"><path d="M4 9 Q30 1 60 9 T120 9 T180 9 T236 9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><path d="M120 3 Q116 7 120 10 Q124 7 120 3 Z" fill="currentColor"/><circle cx="60" cy="9" r="1.4" fill="currentColor" opacity="0.7"/><circle cx="180" cy="9" r="1.4" fill="currentColor" opacity="0.7"/></svg>
        </div>
      </aside>
    </div>

    <!-- ============ AMBIENTE: schwebende Juwelen (Dauer-Animation) ============ -->
    <div class="kal-sparkle-layer" aria-hidden="true">
      <span class="kal-sparkle kal-sparkle--1"></span>
      <span class="kal-sparkle kal-sparkle--2"></span>
      <span class="kal-sparkle kal-sparkle--3"></span>
      <span class="kal-sparkle kal-sparkle--4"></span>
      <span class="kal-sparkle kal-sparkle--5"></span>
      <span class="kal-sparkle kal-sparkle--6"></span>
      <span class="kal-sparkle kal-sparkle--7"></span>
      <span class="kal-sparkle kal-sparkle--8"></span>
      <span class="kal-sparkle kal-sparkle--9"></span>
      <span class="kal-sparkle kal-sparkle--10"></span>
      <span class="kal-sparkle kal-sparkle--11"></span>
      <span class="kal-sparkle kal-sparkle--12"></span>
      <span class="kal-sparkle kal-sparkle--13"></span>
      <span class="kal-sparkle kal-sparkle--14"></span>
      <span class="kal-sparkle kal-sparkle--15"></span>
      <span class="kal-sparkle kal-sparkle--16"></span>
      <span class="kal-sparkle kal-sparkle--17"></span>
      <span class="kal-sparkle kal-sparkle--18"></span>
      <span class="kal-star kal-star--1">✦</span>
      <span class="kal-star kal-star--2">✧</span>
      <span class="kal-star kal-star--3">✦</span>
      <span class="kal-star kal-star--4">✧</span>
      <span class="kal-star kal-star--5">✦</span>
    </div>
    <!-- Aurora-Schimmer als vollflächiger Licht-Verlauf -->
    <div class="kal-aurora" aria-hidden="true"></div>

    <!-- ============ FAB (neuer Termin) ============ -->
    <button id="openNewEvent" class="kal-fab" type="button" aria-label="Neuer Termin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <!-- ============ EVENT DIALOG ============ -->
    <dialog id="eventDialog" class="kal-sheet">
      <form id="eventForm" method="dialog" class="kal-sheet-body">
        <header class="kal-sheet-head">
          <button type="button" class="kal-sheet-close" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
          <h3 id="eventDialogTitle">Neuer Termin</h3>
          <span></span>
        </header>
        <div class="kal-sheet-scroll">
          <input type="hidden" name="eventId" />
          <label class="kal-field">
            <span>Titel</span>
            <input name="title" type="text" maxlength="120" placeholder="z. B. Zahnarzt" required autocomplete="off" />
            <small class="kal-field-hint">Kurz & knackig – das erscheint in der Übersicht.</small>
          </label>
          <label class="kal-field">
            <span>Notiz</span>
            <textarea name="notes" rows="3" maxlength="240" placeholder="Optional"></textarea>
            <small class="kal-field-hint">Platz für Adresse, Telefonnummer oder Gedanken.</small>
          </label>
          <label class="kal-switch kal-switch-inset">
            <input name="allDay" type="checkbox" />
            <span class="kal-switch-track"><span class="kal-switch-thumb"></span></span>
            <span class="kal-switch-label">Ganztägig</span>
          </label>
          <div class="kal-time-grid">
            <label class="kal-field">
              <span>Start</span>
              <input name="startAt" type="datetime-local" required />
            </label>
            <label class="kal-field">
              <span>Ende</span>
              <input name="endAt" type="datetime-local" required />
            </label>
          </div>
          <div class="kal-field">
            <span>Kategorie</span>
            <div id="eventCategoryChips" class="kal-chips"></div>
          </div>
          <div class="kal-field">
            <span>Symbol</span>
            <button type="button" id="eventIconTrigger" class="kal-icon-picker">
              <span class="kal-icon-picker-preview" id="eventIconPreview"></span>
              <span class="kal-icon-picker-label" id="eventIconLabel">Symbol wählen</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <input type="hidden" name="icon" />
          </div>
        </div>
        <footer class="kal-sheet-foot">
          <button type="button" id="eventDeleteButton" class="kal-danger hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>
            Löschen
          </button>
          <button type="submit" class="kal-primary kal-primary-block">Speichern</button>
        </footer>
      </form>
    </dialog>

    <!-- ============ CATEGORY DIALOG ============ -->
    <dialog id="categoryDialog" class="kal-sheet">
      <form id="categoryForm" method="dialog" class="kal-sheet-body">
        <header class="kal-sheet-head">
          <button type="button" class="kal-sheet-close" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
          <h3 id="categoryDialogTitle">Neue Kategorie</h3>
          <span></span>
        </header>
        <div class="kal-sheet-scroll">
          <input type="hidden" name="categoryId" />
          <label class="kal-field">
            <span>Name</span>
            <input name="name" type="text" maxlength="80" placeholder="z. B. Ärzte" required autocomplete="off" />
          </label>
          <label class="kal-field">
            <span>Farbe</span>
            <input name="color" type="color" value="#f59e0b" />
          </label>
          <div class="kal-field">
            <span>Symbol</span>
            <button type="button" id="categoryIconTrigger" class="kal-icon-picker">
              <span class="kal-icon-picker-preview" id="categoryIconPreview"></span>
              <span class="kal-icon-picker-label" id="categoryIconLabel">Symbol wählen</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <input type="hidden" name="icon" />
          </div>
        </div>
        <footer class="kal-sheet-foot">
          <button type="button" id="categoryDeleteButton" class="kal-danger hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>
            Löschen
          </button>
          <button type="submit" class="kal-primary kal-primary-block">Speichern</button>
        </footer>
      </form>
    </dialog>

    <!-- ============ ICON PICKER ============ -->
    <dialog id="iconPickerDialog" class="kal-sheet">
      <div class="kal-sheet-body">
        <header class="kal-sheet-head">
          <button type="button" class="kal-sheet-close" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
          <h3>Symbol wählen</h3>
          <span></span>
        </header>
        <div class="kal-sheet-scroll">
          <label class="kal-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
            <input id="iconSearchInput" type="search" placeholder="Suchen…" />
          </label>
          <div id="iconGrid" class="kal-icon-grid"></div>
        </div>
      </div>
    </dialog>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/calendar-core.js?v=royal4"></script>
    <script src="/static/calendar.js?v=royal4" defer></script>
    <script>
      // Hamburger -> Menü-Overlay (extra robust)
      (function () {
        function init() {
          const overlay = document.getElementById('kalMenuOverlay');
          const toggle  = document.getElementById('kalMenuToggle');
          if (!overlay || !toggle) { console.warn('kal menu: elements missing'); return; }
          const open  = () => { overlay.classList.add('is-open'); overlay.setAttribute('aria-hidden','false'); document.body.classList.add('kal-menu-open'); };
          const close = () => { overlay.classList.remove('is-open'); overlay.setAttribute('aria-hidden','true'); document.body.classList.remove('kal-menu-open'); };
          toggle.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); overlay.classList.contains('is-open') ? close() : open(); });
          overlay.addEventListener('click', (e) => {
            if (e.target.closest('[data-close-menu]')) { close(); return; }
            if (e.target === overlay || e.target.classList.contains('kal-menu-scrim')) { close(); return; }
            if (e.target.closest('button[data-tab]')) { setTimeout(close, 220); }
          });
          document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && overlay.classList.contains('is-open')) close(); });
          console.log('kal menu: ready');
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
      })();
    </script>
  </body>
</html>
