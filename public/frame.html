<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Frame</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      /* UI-Skalierung im Foto-Modus (live einstellbar ueber /admin) */
      :root{--photo-ui-scale:1;--photo-ui-scale-weather:1;--photo-ui-scale-clock:1;--photo-ui-scale-sensors:1;--photo-ui-scale-events:1}
      .frame-stage[data-view="photo"] .photo-event-widget{transform:scale(calc(var(--photo-ui-scale,1) * var(--photo-ui-scale-events,1)));transform-origin:bottom right;transition:transform 220ms ease}
      .frame-stage[data-view="photo"] .frame-sensors{transform:scale(calc(var(--photo-ui-scale,1) * var(--photo-ui-scale-sensors,1)));transform-origin:top center;transition:transform 220ms ease}
      .frame-stage[data-view="photo"] .weather-widget,
      .frame-stage[data-view="photo"] #weatherWidget,
      .frame-stage[data-view="photo"] .frame-weather{transform:scale(calc(var(--photo-ui-scale,1) * var(--photo-ui-scale-weather,1)));transform-origin:top left;transition:transform 220ms ease}
      .frame-stage[data-view="photo"] .frame-copy{transform:scale(var(--photo-ui-scale,1));transform-origin:bottom left;transition:transform 220ms ease}
      .frame-stage[data-view="photo"] .frame-clock{transform:scale(calc(var(--photo-ui-scale,1) * var(--photo-ui-scale-clock,1)));transform-origin:top right;transition:transform 220ms ease}
      /* Neues 3-Spalten-Layout: Wetter links, Sensoren mittig, Uhr rechts */
      .frame-shell .frame-meta{display:grid !important;grid-template-columns:1fr auto 1fr;align-items:start;justify-items:center;gap:1rem;left:1.6rem !important;right:2.2rem !important;padding-right:0.4rem}
      .frame-shell .frame-meta > #frameWeather{justify-self:start}
      .frame-shell .frame-meta > #frameSensors{justify-self:center}
      .frame-shell .frame-meta > #frameClock{justify-self:end;margin-right:0.4rem}
      #frameCounter{display:none !important}
    </style>
  </head>
  <body class="frame-shell">
    <div id="frameBackground" class="frame-background aurora"></div>
    <main class="frame-stage">
      <section id="framePhotoView" class="frame-mode-view is-active">
        <section class="frame-layer is-visible" id="slidePrimary">
          <img class="frame-image" alt="Aktuelles Bild" />
          <div class="frame-overlay">
            <div class="frame-copy" data-card="floating">
              <p class="frame-subtitle"></p>
              <h1 class="frame-title"></h1>
              <div class="frame-slide-meta hidden"></div>
            </div>
          </div>
        </section>

        <section class="frame-layer" id="slideSecondary">
          <img class="frame-image" alt="Nächstes Bild" />
          <div class="frame-overlay">
            <div class="frame-copy" data-card="floating">
              <p class="frame-subtitle"></p>
              <h1 class="frame-title"></h1>
              <div class="frame-slide-meta hidden"></div>
            </div>
          </div>
        </section>

        <aside id="photoEventWidget" class="photo-event-widget hidden">
          <button type="button" id="photoEventHide" class="photo-event-toggle" aria-label="Termine ausblenden" title="Termine ausblenden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.3 5.2A10.3 10.3 0 0 1 12 5c5 0 9.3 3.4 10.5 7-.4 1.2-1.1 2.3-2 3.3M6.3 6.3C4 7.8 2.3 10 1.5 12c1.2 3.6 5.5 7 10.5 7 1.9 0 3.7-.5 5.2-1.3"/></svg>
          </button>
          <header>
            <strong>Heute</strong>
            <small id="photoEventDate"></small>
          </header>
          <div id="photoEventList"></div>
        </aside>
        <button type="button" id="photoEventShow" class="photo-event-show hidden" aria-label="Termine einblenden" title="Termine einblenden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 12C2.7 8.4 7 5 12 5s9.3 3.4 10.5 7c-1.2 3.6-5.5 7-10.5 7S2.7 15.6 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </section>

      <section id="frameCalendarView" class="frame-mode-view frame-calendar-fullscreen">
        <header class="frame-cal-topbar">
          <div class="frame-cal-title">
            <p class="cal-eyebrow">Kalender</p>
            <h2 id="frameCalendarTitle">Heute</h2>
          </div>
          <div class="cal-segmented" id="frameCalendarTabs">
            <button type="button" class="is-active" data-view="day">Tag</button>
            <button type="button" data-view="week">Woche</button>
            <button type="button" data-view="month">Monat</button>
          </div>
          <div class="frame-cal-nav">
            <button id="frameCalendarPrev" class="cal-round-button" type="button" aria-label="Zurück">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
            </button>
            <button id="frameCalendarToday" class="cal-pill-button" type="button">Heute</button>
            <button id="frameCalendarNext" class="cal-round-button" type="button" aria-label="Weiter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <button id="frameCalendarNew" class="cal-primary-button cal-icon-only" type="button" aria-label="Neuer Termin" title="Neuer Termin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button id="frameCalendarMenu" class="cal-round-button" type="button" aria-label="Menü" title="Menü">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
            </button>
          </div>
        </header>

        <div id="frameCalendarSurface" class="frame-cal-surface">
          <div id="frameCalendarContent" class="frame-cal-content"></div>
        </div>
      </section>

      <div class="frame-meta">
        <div id="frameWeather" class="frame-weather hidden" aria-live="polite">
          <span class="frame-weather-icon" id="frameWeatherIcon"></span>
          <span class="frame-weather-body">
            <strong id="frameWeatherTemp">--°</strong>
            <small id="frameWeatherLoc"></small>
          </span>
        </div>
        <div id="frameSensors" class="frame-sensors hidden" aria-live="polite" data-aqi="unknown">
          <span class="frame-sensor frame-sensor--temp" title="Raumtemperatur">
            <svg class="frame-sensor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a2.5 2.5 0 0 0-2.5 2.5v9.2a4.5 4.5 0 1 0 5 0V5.5A2.5 2.5 0 0 0 12 3z"/><circle cx="12" cy="17" r="1.6" fill="currentColor" stroke="none"/><line x1="12" y1="8" x2="12" y2="15"/></svg>
            <strong id="frameSensorTemp">--°</strong>
          </span>
          <span class="frame-sensor frame-sensor--hum" title="Luftfeuchte">
            <svg class="frame-sensor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3c3 5 6 8 6 12a6 6 0 1 1-12 0c0-4 3-7 6-12z"/><path d="M9 14.5a3 3 0 0 0 2 3" opacity="0.55"/></svg>
            <strong id="frameSensorHum">--%</strong>
          </span>
          <span class="frame-sensor frame-sensor--aqi" id="frameSensorAqiBox" title="Luftqualität">
            <!-- FRISCH: leaf + sparkle -->
            <svg class="frame-sensor-icon aqi-icon aqi-icon--fresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 4C11 4 5 8 5 15c0 3 2 5 5 5 7 0 10-6 10-15z" fill="currentColor" fill-opacity="0.18"/>
              <path d="M5 20c3-6 7-10 14-14" />
              <circle cx="17.5" cy="6" r="0.9" fill="currentColor" stroke="none"/>
              <circle cx="14.5" cy="4.5" r="0.6" fill="currentColor" stroke="none"/>
            </svg>
            <!-- MÜFFELIG: wavy smell lines -->
            <svg class="frame-sensor-icon aqi-icon aqi-icon--stale" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 9c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
              <path d="M4 14c2-2 4-2 6 0s4 2 6 0 4-2 6 0" opacity="0.75"/>
              <path d="M4 19c2-2 4-2 6 0s4 2 6 0 4-2 6 0" opacity="0.5"/>
            </svg>
            <!-- GIFTIG: skull / warning -->
            <svg class="frame-sensor-icon aqi-icon aqi-icon--toxic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3a7 7 0 0 0-7 7v2c0 2 1 3.5 3 4v2a1 1 0 0 0 1 1h1.5v-2h3V19H15a1 1 0 0 0 1-1v-2c2-.5 3-2 3-4v-2a7 7 0 0 0-7-7z" fill="currentColor" fill-opacity="0.15"/>
              <circle cx="9" cy="11" r="1.4" fill="currentColor" stroke="none"/>
              <circle cx="15" cy="11" r="1.4" fill="currentColor" stroke="none"/>
              <path d="M11 14.5l1 1 1-1"/>
            </svg>
            <strong id="frameSensorAqiLabel">--</strong>
          </span>
        </div>
        <span id="frameCounter" class="frame-counter hidden" hidden></span>
        <span id="frameClock" class="frame-clock hidden"></span>
      </div>

      <div class="frame-view-indicator" aria-hidden="true">
        <span id="dotPhoto" class="dot is-active"></span>
        <span id="dotCalendar" class="dot"></span>
      </div>

      <div id="frameEmpty" class="frame-empty">
        <p>Noch keine Bilder geladen.</p>
        <small>Auf dem Handy unter „/" Bilder hochladen.</small>
      </div>
    </main>

    <dialog id="eventDialog" class="cal-dialog">
      <form id="eventForm" method="dialog" class="cal-dialog-body">
        <header>
          <h3 id="eventDialogTitle">Neuer Termin</h3>
          <button type="button" class="cal-icon-button cal-icon-svg" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>
        <input type="hidden" name="eventId" />
        <label class="cal-field">
          <span>Titel</span>
          <input name="title" type="text" maxlength="120" placeholder="z. B. Zahnarzt" required />
        </label>
        <label class="cal-field">
          <span>Notiz</span>
          <textarea name="notes" rows="2" maxlength="240" placeholder="Optional"></textarea>
        </label>
        <div class="cal-two-col">
          <label class="cal-field">
            <span>Start</span>
            <input name="startAt" type="datetime-local" required />
          </label>
          <label class="cal-field">
            <span>Ende</span>
            <input name="endAt" type="datetime-local" required />
          </label>
        </div>
        <label class="cal-toggle-switch">
          <span class="cal-toggle-switch-label">Ganztägig</span>
          <input name="allDay" type="checkbox" />
          <span class="cal-toggle-switch-track"><span class="cal-toggle-switch-thumb"></span></span>
        </label>
        <div class="cal-field">
          <span>Kategorie</span>
          <div id="eventCategoryChips" class="cal-category-chips"></div>
        </div>
        <div class="cal-field">
          <span>Symbol</span>
          <button type="button" id="eventIconTrigger" class="cal-icon-picker-trigger">
            <span class="cal-icon-picker-preview" id="eventIconPreview"></span>
            <span id="eventIconLabel">Symbol wählen</span>
            <small>Antippen zum Ändern</small>
          </button>
          <input type="hidden" name="icon" />
        </div>
        <footer>
          <button type="button" id="eventDeleteButton" class="cal-danger-button cal-action-button hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>
            <span>Löschen</span>
          </button>
          <button type="button" class="cal-ghost-button cal-action-button" data-close>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            <span>Abbrechen</span>
          </button>
          <button type="submit" class="cal-primary-button cal-action-button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
            <span>Speichern</span>
          </button>
        </footer>
      </form>
    </dialog>

    <dialog id="categoryDialog" class="cal-dialog">
      <form id="categoryForm" method="dialog" class="cal-dialog-body">
        <header>
          <h3 id="categoryDialogTitle">Neue Kategorie</h3>
          <button type="button" class="cal-icon-button cal-icon-svg" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>
        <input type="hidden" name="categoryId" />
        <label class="cal-field">
          <span>Name</span>
          <input name="name" type="text" maxlength="80" placeholder="z. B. Ärzte" required />
        </label>
        <label class="cal-field">
          <span>Farbe</span>
          <input name="color" type="color" value="#f59e0b" />
        </label>
        <div class="cal-field">
          <span>Symbol</span>
          <button type="button" id="categoryIconTrigger" class="cal-icon-picker-trigger">
            <span class="cal-icon-picker-preview" id="categoryIconPreview"></span>
            <span id="categoryIconLabel">Symbol wählen</span>
            <small>Antippen zum Ändern</small>
          </button>
          <input type="hidden" name="icon" />
        </div>
        <footer>
          <button type="button" id="categoryDeleteButton" class="cal-danger-button cal-action-button hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>
            <span>Löschen</span>
          </button>
          <button type="button" class="cal-ghost-button cal-action-button" data-close>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            <span>Abbrechen</span>
          </button>
          <button type="submit" class="cal-primary-button cal-action-button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
            <span>Speichern</span>
          </button>
        </footer>
      </form>
    </dialog>

    <dialog id="iconPickerDialog" class="cal-dialog cal-dialog-wide">
      <div class="cal-dialog-body">
        <header>
          <h3>Symbol wählen</h3>
          <button type="button" class="cal-icon-button cal-icon-svg" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>
        <label class="cal-search-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
          <input id="iconSearchInput" type="search" placeholder="Suche z. B. Arzt, Sport, Feier…" />
        </label>
        <div id="iconGrid" class="cal-icon-grid"></div>
      </div>
    </dialog>

    <dialog id="menuDialog" class="cal-dialog cal-dialog-wide cal-menu-dialog">
      <div class="cal-dialog-body">
        <header>
          <h3>Verwaltung</h3>
          <button type="button" class="cal-icon-button cal-icon-svg" data-close aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>
        <nav class="cal-menu-tabs" id="menuTabs">
          <button type="button" class="is-active" data-menu-tab="categories">Kategorien</button>
          <button type="button" data-menu-tab="settings">Einstellungen</button>
        </nav>

        <section class="cal-menu-panel is-active" data-menu-panel="categories">
          <div class="cal-panel-head">
            <p class="cal-helper">Farben und Symbole für deine Termine.</p>
            <button id="menuNewCategory" class="cal-primary-button" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              Neue Kategorie
            </button>
          </div>
          <div id="categoryList" class="cal-category-grid"></div>
        </section>

        <section class="cal-menu-panel" data-menu-panel="settings">
          <form id="calendarSettingsForm" class="cal-settings-form">
            <label class="cal-field">
              <span>Termine im Foto-Widget</span>
              <input name="photoWidgetMax" type="number" min="1" max="6" step="1" />
            </label>
            <label class="cal-toggle-row">
              <input name="showPhotoWidget" type="checkbox" />
              <span>Terminvorschau im Foto-Modus anzeigen</span>
            </label>
            <label class="cal-toggle-row">
              <input name="swipeEnabled" type="checkbox" />
              <span>Wischgesten zwischen Foto und Kalender erlauben</span>
            </label>
            <button class="cal-primary-button" type="submit">Speichern</button>
          </form>
        </section>
      </div>
    </dialog>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/calendar-core.js"></script>
    <script src="/static/frame.js" defer></script>
  </body>
</html>
